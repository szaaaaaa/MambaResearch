name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e .
          pip install pytest websocket-client httpx

      - name: Dynamic OS Tests
        run: |
          pytest -q \
            tests/test_dynamic_os_phase1.py \
            tests/test_dynamic_os_phase2.py \
            tests/test_dynamic_os_phase3.py \
            tests/test_dynamic_os_hitl.py \
            tests/test_server_runs_history.py \
            -p no:cacheprovider

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit
          npm run build
